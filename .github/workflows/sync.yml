name: Invan API sinxronizatsiyasi

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Necha kunlik tarixni olish"
        default: "30"
        required: false

concurrency:
  group: invan-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Repo'ni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kutubxonalarni o'rnatish
        run: pip install requests openpyxl

      - name: Invan API'ga ulanishni tekshirish
        run: |
          curl -s -o /dev/null -w "HTTP holat: %{http_code}\n" --max-time 15 https://api.7i.uz/integration/v1/order || echo "ULANMADI (timeout/xato)"

      - name: API'dan sotuv va mahsulot ma'lumotlarini yuklash
        env:
          INVAN_API_TOKEN: ${{ secrets.INVAN_API_TOKEN }}
        run: python -u fetch_api_data.py --days ${{ github.event.inputs.days || '30' }}

      - name: Butun saytni qayta qurish
        run: python build_all_from_api.py

      - name: O'zgarishlarni commit+push qilish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sales.html index.html data_daily.json data_mahsulotlar.json data_inv_new.json data_supplier.json
          if git diff --staged --quiet; then
            echo "O'zgarish yo'q, commit qilinmaydi."
          else
            git commit -m "Avtomatik yangilanish: Invan API sotuv ma'lumotlari $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push muvaffaqiyatli."
                exit 0
              fi
              echo "Push rad etildi (boshqa o'zgarish kelib tushgan bo'lishi mumkin), pull --rebase qilib qayta urinilmoqda ($i/5)..."
              git pull --rebase origin main
              sleep 5
            done
            echo "5 marta urinishdan keyin ham push qilib bo'lmadi."
            exit 1
          fi
