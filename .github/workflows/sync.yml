name: Invan API sinxronizatsiyasi

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Necha kunlik tarixni olish"
        default: "30"
        required: false

concurrency:
  group: invan-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Repo'ni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kutubxonalarni o'rnatish
        run: pip install requests openpyxl

      - name: Invan API'ga ulanishni tekshirish (token'siz)
        run: |
          curl -s -o /dev/null -w "HTTP holat: %{http_code}\n" --max-time 15 https://api.7i.uz/integration/v1/order || echo "ULANMADI (timeout/xato)"

      - name: Invan API'ga ulanishni tekshirish (token bilan)
        env:
          INVAN_API_TOKEN: ${{ secrets.INVAN_API_TOKEN }}
        run: |
          curl -s -o /tmp/resp.json -w "HTTP holat: %{http_code}, vaqt: %{time_total}s\n" --max-time 20 \
            -H "Authorization: Bearer $INVAN_API_TOKEN" \
            "https://api.7i.uz/integration/v1/order?page=1&limit=5" || echo "ULANMADI (timeout/xato) - autentifikatsiyalangan so'rov javob bermadi"
          head -c 500 /tmp/resp.json 2>/dev/null || true

      - name: API'dan sotuv va mahsulot ma'lumotlarini yuklash
        env:
          INVAN_API_TOKEN: ${{ secrets.INVAN_API_TOKEN }}
        run: python -u fetch_api_data.py --days ${{ github.event.inputs.days || '30' }}

      - name: Butun saytni qayta qurish
        run: python build_all_from_api.py

      - name: O'zgarishlarni commit+push qilish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sales.html index.html data_daily.json data_mahsulotlar.json data_inv_new.json
          if git diff --staged --quiet; then
            echo "O'zgarish yo'q, commit qilinmaydi."
          else
            git commit -m "Avtomatik yangilanish: Invan API sotuv ma'lumotlari $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
